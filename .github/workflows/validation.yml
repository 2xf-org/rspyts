name: Validation

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string
        default: ""
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  VALIDATION_REF: ${{ inputs.ref || github.sha }}

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.VALIDATION_REF }}
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
          cache-key: validation
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test Rust integrations
        run: |
          cargo test --locked -p rspyts --test contract --test python
          cargo test --locked -p rspyts-cli --test cli
      - name: Check WebAssembly exports
        run: cargo check --locked -p example --target wasm32-unknown-unknown

  generated-packages:
    name: Generated packages (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.VALIDATION_REF }}
          persist-credentials: false
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: example/src-ts/package-lock.json
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          cache-key: generated-${{ matrix.os }}
      - name: Build generated sources
        run: cargo run --locked -p rspyts-cli -- build
      - name: Check source-project ownership
        shell: bash
        run: |
          set -euo pipefail

          git diff --exit-code -- example/src-py example/src-ts example/rspyts.toml \
            ':(exclude)**/*.so' \
            ':(exclude)**/*.pyd' \
            ':(exclude)**/*.wasm'

          untracked=$(git ls-files --others --exclude-standard \
            example/src-py \
            example/src-ts \
            | grep -Ev '\.(so|pyd|wasm)$' || true)
          if [[ -n "$untracked" ]]; then
            echo "untracked generated sources:" >&2
            echo "$untracked" >&2
            exit 1
          fi
      - name: Check generated packages
        run: cargo run --locked -p rspyts-cli -- check
      - name: Test Python integrations
        working-directory: example/src-py
        run: |
          python -m pip install --disable-pip-version-check 'mypy>=1,<2' 'pyright>=1,<2' 'pytest>=8,<9' -e .
          python -m pytest -q tests
          python -m mypy typecheck.py
          pyright typecheck.py
          python -m pip wheel --disable-pip-version-check --no-deps . --wheel-dir wheelhouse
      - name: Test TypeScript integrations
        run: |
          npm --prefix example/src-ts ci
          npm --prefix example/src-ts run check
          npm --prefix example/src-ts run build
          npm pack ./example/src-ts --dry-run
          node --input-type=module --eval 'const { excitedGreeting, greet } = await import("./example/src-ts/build/example/index.js"); if (greet("Ada").message !== "Hello, Ada!") throw new Error("generated greeting failed"); if (excitedGreeting("Ada") !== "HELLO, ADA!") throw new Error("authored greeting failed");'
