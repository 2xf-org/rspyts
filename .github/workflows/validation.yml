name: Validation

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string
        default: ""
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  VALIDATION_REF: ${{ inputs.ref || github.sha }}

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.VALIDATION_REF }}
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
          cache-key: validation
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Check WebAssembly exports
        run: cargo check --locked -p example --target wasm32-unknown-unknown

  generated-packages:
    name: Generated packages (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.VALIDATION_REF }}
          persist-credentials: false
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: example/clients/typescript/package-lock.json
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          cache-key: generated-${{ matrix.os }}
      - name: Build and check generated packages
        run: |
          cargo run --locked -p rspyts-cli -- build
          cargo run --locked -p rspyts-cli -- check
      - name: Test the Python client
        working-directory: example/clients/python
        run: |
          python -m pip install --disable-pip-version-check pytest -e ../../crates/bindings/dist/python -e .
          python -m pytest -q tests
      - name: Test the TypeScript client
        run: |
          npm --prefix example/clients/typescript ci
          npm --prefix example/clients/typescript run check
          npm --prefix example/clients/typescript run build
          npm --prefix example/clients/typescript run start
