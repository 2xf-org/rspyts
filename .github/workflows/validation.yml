name: Validation

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string
        default: ""
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  VALIDATION_REF: ${{ inputs.ref || github.sha }}

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.VALIDATION_REF }}
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
          cache-key: validation
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Check WebAssembly exports
        run: cargo check --locked -p example --target wasm32-unknown-unknown

  generated-packages:
    name: Generated packages (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.VALIDATION_REF }}
          persist-credentials: false
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: example/clients/typescript/package-lock.json
      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          cache-key: generated-${{ matrix.os }}
      - name: Build generated packages
        run: cargo run --locked -p rspyts-cli -- build
      - name: Check committed generated sources
        shell: bash
        run: |
          set -euo pipefail

          git diff --exit-code -- example/crates/bindings/dist \
            ':(exclude)**/*.so' \
            ':(exclude)**/*.pyd' \
            ':(exclude)**/*.wasm'

          untracked=$(git ls-files --others --exclude-standard \
            example/crates/bindings/dist \
            | grep -Ev '\.(so|pyd|wasm)$' || true)
          if [[ -n "$untracked" ]]; then
            echo "untracked generated sources:" >&2
            echo "$untracked" >&2
            exit 1
          fi
      - name: Check generated packages
        run: cargo run --locked -p rspyts-cli -- check
      - name: Check aggregate artifacts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("example/crates/bindings/dist")
          native = [
              path
              for path in (root / "python").rglob("native.*")
              if path.suffix in {".so", ".pyd"}
          ]
          wasm = list((root / "typescript").rglob("*.wasm"))

          assert len(native) == 1, native
          assert len(wasm) == 1, wasm
          assert not (root / "python/example/api.py").exists()
          assert not (root / "python/example/models.py").exists()
          assert (root / "typescript/index.js").read_text() == ""
          assert (root / "typescript/index.d.ts").read_text() == ""
          PY
      - name: Test the Python client
        working-directory: example/clients/python
        run: |
          python -m pip install --disable-pip-version-check mypy pyright pytest -e ../../crates/bindings/dist/python -e .
          python -m pytest -q tests
          python -m mypy typecheck.py
          pyright typecheck.py
      - name: Test the TypeScript client
        run: |
          npm --prefix example/clients/typescript ci
          npm --prefix example/clients/typescript run check
          npm --prefix example/clients/typescript run build
          npm --prefix example/clients/typescript run start
