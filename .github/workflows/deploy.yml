# Release pipeline, triggered by pushing a stable version tag (v0.1.0, v1.2.3, ...).
#
#   verify --> { publish-crates, publish-pypi, publish-npm } --> github-release
#
# One-time setup required before the first release (details in docs/releasing.md):
#   - crates.io: Trusted Publishers registered for all four crates for this
#     workflow file (deploy.yml) and the `crates-io` environment. No token.
#   - PyPI: a Trusted Publisher registered on pypi.org for this repository,
#     this workflow file (deploy.yml), and the `pypi` environment. No token.
#   - npm: a Trusted Publisher registered for the rspyts package for this
#     workflow file (deploy.yml) and the `npm` environment. No token.
#   (Full walkthrough: docs/releasing.md.)

name: Deploy

on:
  push:
    tags: ["v*"]

# Serialize releases: two tags pushed in quick succession must not
# interleave the sequential crates.io publish chain. Never cancel an
# in-flight publish.
concurrency:
  group: deploy
  cancel-in-progress: false

# Least privilege by default; jobs that publish declare their own grants.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: nothing publishes unless the full Rust test suite passes at the tag.
  # (Runtime and example suites run on every push to main via validation.yml; the tag
  # commit has already been through them.)
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify release versions
        run: python3 .github/scripts/verify-release.py
      - name: Test
        run: cargo test --workspace

  publish-crates:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Publish in dependency order: core -> macros -> facade -> CLI. Each
      # crate must be resolvable on crates.io before its dependents build
      # there, so the workflow polls the registry API between publishes.
      - name: Publish rspyts-core
        run: cargo publish --locked -p rspyts-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for rspyts-core
        run: .github/scripts/wait-for-crate.sh rspyts-core "${GITHUB_REF_NAME#v}"

      - name: Publish rspyts-macros
        run: cargo publish --locked -p rspyts-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for rspyts-macros
        run: .github/scripts/wait-for-crate.sh rspyts-macros "${GITHUB_REF_NAME#v}"

      - name: Publish rspyts
        run: cargo publish --locked -p rspyts
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for rspyts
        run: .github/scripts/wait-for-crate.sh rspyts "${GITHUB_REF_NAME#v}"

      - name: Publish rspyts-cli
        run: cargo publish --locked -p rspyts-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-pypi:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    # The environment name is half of the Trusted Publishing handshake; it
    # must match the environment configured for this publisher on pypi.org.
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        working-directory: runtimes/python
        run: uv build

      # Trusted Publishing: the action exchanges this job's OIDC token
      # (id-token: write above) for a short-lived PyPI upload token — no
      # long-lived secret exists anywhere. Requires the one-time publisher
      # registration on pypi.org described in RELEASING.md.
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: runtimes/python/dist

  publish-npm:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # npm OIDC authentication and provenance attestation
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build
        working-directory: runtimes/typescript
        run: |
          npm ci
          npm run build

      # npm exchanges this job's OIDC token for short-lived publish access;
      # --provenance also binds the tarball to this exact workflow run.
      - name: Publish
        working-directory: runtimes/typescript
        run: npm publish --provenance --access public

  # Only after every registry has the artifacts: a GitHub release with notes
  # auto-generated from the merged PRs since the previous tag.
  github-release:
    name: GitHub release
    needs: [publish-crates, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and its notes
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
