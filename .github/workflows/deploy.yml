# Publish an annotated vMAJOR.MINOR.PATCH tag from main.

name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated tag to publish
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  source:
    name: Check release source
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Check tag and version
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag=${REQUESTED_TAG:-$GITHUB_REF_NAME}
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag must have the form vX.Y.Z" >&2
            exit 1
          fi
          if [[ "$(git cat-file -t "refs/tags/$tag")" != tag ]]; then
            echo "$tag must be an annotated tag" >&2
            exit 1
          fi

          sha=$(git rev-parse "refs/tags/$tag^{commit}")
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$sha" refs/remotes/origin/main; then
            echo "$tag is not on main" >&2
            exit 1
          fi

          git checkout --detach "$sha"
          version=${tag#v}
          versions=$(cargo metadata --no-deps --format-version 1 | jq -r '
            .packages[]
            | select(.name == "rspyts-macros" or .name == "rspyts" or .name == "rspyts-cli")
            | .version
          ' | sort -u)
          if [[ "$versions" != "$version" ]]; then
            echo "all release crates must have version $version" >&2
            exit 1
          fi

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  validation:
    name: Validate
    needs: source
    uses: ./.github/workflows/validation.yml
    with:
      ref: ${{ needs.source.outputs.sha }}
    permissions:
      contents: read

  publish:
    name: Publish crates
    needs: [source, validation]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.source.outputs.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: release
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - uses: ./.github/actions/publish-crate
        with:
          crate: rspyts-macros
          version: ${{ needs.source.outputs.version }}
          token: ${{ steps.auth.outputs.token }}
      - uses: ./.github/actions/publish-crate
        with:
          crate: rspyts
          version: ${{ needs.source.outputs.version }}
          token: ${{ steps.auth.outputs.token }}
      - uses: ./.github/actions/publish-crate
        with:
          crate: rspyts-cli
          version: ${{ needs.source.outputs.version }}
          token: ${{ steps.auth.outputs.token }}

  release:
    name: Create GitHub release
    needs: [source, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.source.outputs.sha }}
          persist-credentials: false
      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.source.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --draft=false \
              --prerelease=false \
              --title "rspyts $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "rspyts $RELEASE_TAG" \
              --generate-notes
          fi
