# Release pipeline, triggered by pushing a stable version tag (v0.1.0, v1.2.3, ...).
#
#   validation -> verify -> crates.io -> PyPI -> npm -> GitHub release
#
# One-time setup required before the first release (details in docs/releasing.md):
#   - crates.io: Trusted Publishers registered for all four crates for this
#     workflow file (deploy.yml) and the `crates-io` environment. No token.
#   - PyPI: a Trusted Publisher registered on pypi.org for this repository,
#     this workflow file (deploy.yml), and the `pypi` environment. No token.
#   - npm: a Trusted Publisher registered for the rspyts package for this
#     workflow file (deploy.yml) and the `npm` environment. No token.
#   (Full walkthrough: docs/releasing.md.)

name: Deploy

on:
  push:
    tags: ["v*"]
  # With no version, manual runs are safe preflights. Supplying the exact
  # workspace version resumes an interrupted release without moving its tag.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (for example, 0.2.0); leave empty for validation only"
        required: false
        type: string

# Serialize releases: two tags pushed in quick succession must not
# interleave the sequential crates.io publish chain. Never cancel an
# in-flight publish.
concurrency:
  group: deploy
  cancel-in-progress: false

# Least privilege by default; jobs that publish declare their own grants.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

jobs:
  validation:
    name: Full validation
    uses: ./.github/workflows/validation.yml
    permissions:
      contents: read

  # Release-specific metadata/package gate. Tag pushes validate their exact
  # SHA; recovery runs check out the existing tag before packaging it again.
  verify:
    name: Verify
    needs: validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Verify release versions
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "rspyts") | .version')
          test "$(jq -r .version runtimes/typescript/package.json)" = "$version"
          test "$(sed -n 's/^version = "\([^"]*\)"/\1/p' runtimes/python/pyproject.toml | head -1)" = "$version"
          if [[ "$GITHUB_EVENT_NAME" == push ]]; then
            test "$GITHUB_REF_NAME" = "v$version"
          elif [[ -n "$RELEASE_VERSION" ]]; then
            test "$RELEASE_VERSION" = "$version"
          fi

  build-runtime-artifacts:
    name: Build runtime artifacts
    if: github.event_name == 'push' || inputs.version != ''
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
      - name: Build PyPI distributions
        working-directory: runtimes/python
        run: uv build --out-dir ../../release-artifacts/python
      - name: Build npm tarball
        working-directory: runtimes/typescript
        run: |
          mkdir -p ../../release-artifacts/npm
          npm ci
          npm run build
          npm pack --pack-destination ../../release-artifacts/npm
      - name: Preserve exact runtime artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-packages-${{ github.sha }}
          path: release-artifacts
          if-no-files-found: error
          retention-days: 7

  publish-crates:
    name: Publish to crates.io
    if: github.event_name == 'push' || inputs.version != ''
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth

      # Publish in dependency order. After each upload, wait until crates.io
      # serves that exact version so the next crate can verify its dependency.
      - name: Publish crates
        run: |
          set -euo pipefail

          version=${RELEASE_VERSION#v}

          available() {
            curl \
              --user-agent "rspyts-release/$version (https://github.com/2xf-org/rspyts)" \
              --fail --silent --show-error "$1" >/dev/null 2>&1
          }

          publish() {
            local crate=$1
            local url="https://crates.io/api/v1/crates/$crate/$version"

            if ! available "$url"; then
              cargo publish --locked -p "$crate"
            fi

            for _ in {1..30}; do
              if available "$url"; then
                return 0
              fi
              sleep 10
            done

            echo "$crate $version did not become available on crates.io" >&2
            return 1
          }

          publish rspyts-core
          publish rspyts-macros
          publish rspyts
          publish rspyts-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' || inputs.version != ''
    needs: [build-runtime-artifacts, publish-crates]
    runs-on: ubuntu-latest
    # The environment name is half of the Trusted Publishing handshake; it
    # must match the environment configured for this publisher on pypi.org.
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-packages-${{ github.sha }}
          path: release-artifacts

      # Trusted Publishing: the action exchanges this job's OIDC token
      # (id-token: write above) for a short-lived PyPI upload token — no
      # long-lived secret exists anywhere. Requires the one-time publisher
      # registration on pypi.org described in docs/releasing.md.
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release-artifacts/python
          skip-existing: true

  publish-npm:
    name: Publish to npm
    if: github.event_name == 'push' || inputs.version != ''
    needs: publish-pypi
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # npm OIDC authentication and provenance attestation
    steps:
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-packages-${{ github.sha }}
          path: release-artifacts

      # npm exchanges this job's OIDC token for short-lived publish access;
      # --provenance also binds the tarball to this exact workflow run.
      - name: Publish
        run: |
          version="${RELEASE_VERSION#v}"
          if npm view "rspyts@${version}" version >/dev/null 2>&1; then
            echo "rspyts ${version} is already published on npm"
          else
            npm publish release-artifacts/npm/rspyts-*.tgz --provenance --access public
          fi

  # Only after every registry has the artifacts: a GitHub release with notes
  # auto-generated from the merged PRs since the previous tag.
  github-release:
    name: GitHub release
    if: github.event_name == 'push' || inputs.version != ''
    needs: [publish-crates, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and its notes
    steps:
      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version) }}
          generate_release_notes: true
