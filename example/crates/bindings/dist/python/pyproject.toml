[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "example"
version = "1.0.3"
requires-python = ">=3.11"
dependencies = ["pydantic>=2,<3", "numpy>=2,<3"]

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
"*" = ["*.so", "*.pyd", "py.typed"]
