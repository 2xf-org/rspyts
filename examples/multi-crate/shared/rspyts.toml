# Code generation config for the shared-types side of the multi-crate
# example. Run from anywhere:
#   rspyts generate --config examples/multi-crate/shared/rspyts.toml

[crate]
# Build the real shared-types crate as its own module. The feature adds the
# exporter only for this standalone build; app dependencies leave it disabled.
path = "rust"
features = ["standalone-module"]
no-default-features = true

[python]
out = "python/src/shared_types/generated"
# `rspyts build` stages the host library in `generated/lib` by default.
# Nothing here calls it — this package is types only — but the loader and
# artifact layout are generated uniformly.

[typescript]
out = "typescript/src/generated"
