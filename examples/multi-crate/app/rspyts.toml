# Code generation config for the app side of the multi-crate example.
# Run from anywhere:
#   rspyts generate --config examples/multi-crate/app/rspyts.toml

[crate]
path = "rust"
features = []
no-default-features = false

[python]
out = "python/src/multi_crate_app/generated"
# `rspyts build` stages the host library in `generated/lib` by default.

# Types whose origin is the shared-types crate are imported from its own
# generated package instead of re-emitted here — that is the point of
# this example.
[python.imports]
"shared-types" = "shared_types.generated"

[typescript]
out = "typescript/src/generated"

[typescript.imports]
"shared-types" = "shared-types-example"
